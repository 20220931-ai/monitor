<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ESP32 Water Level</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8f9fa;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h2 {
      margin-bottom: 20px;
    }

    .gauge-container {
      width: 280px;
      height: 280px;
      position: relative;
    }

    #valorPorcentaje {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      font-size: 42px;
      font-weight: bold;
    }

    #valorCm {
      margin-top: 20px;
      font-size: 24px;
      color: #444;
    }

    #alarma {
      margin-top: 10px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>ESP32 Water Level</h2>

<div class="gauge-container">
  <canvas id="gauge"></canvas>
  <div id="valorPorcentaje">0%</div>
</div>

<div id="valorCm">0 cm</div>
<div id="alarma">--</div>

<script>
  var firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "monitoreo-tinacos-marpa.firebaseapp.com",
    databaseURL: "https://monitoreo-tinacos-marpa-default-rtdb.firebaseio.com",
    projectId: "monitoreo-tinacos-marpa"
  };

  firebase.initializeApp(firebaseConfig);
  var database = firebase.database();

  const ctx = document.getElementById('gauge').getContext('2d');

  let gaugeChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [0, 100],
        backgroundColor: ['#2196f3', '#e0e0e0'],
        borderWidth: 0
      }]
    },
    options: {
      cutout: '75%',
      rotation: -90,
      circumference: 360,
      plugins: { legend: { display: false } },
      animation: {
        animateRotate: true,
        duration: 800
      }
    }
  });

  database.ref("tinacos/tinaco1").on("value", function(snapshot) {
    var data = snapshot.val();
    if (data) {

      let nivel = data.nivel || 0;
      let cm = data.cm || 0;

      let color = "#2196f3";
      let textoAlarma = "NIVEL NORMAL";

      if (nivel <= 20) {
        color = "#f44336";
        textoAlarma = "⚠️ VACÍO";
      } 
      else if (nivel >= 80) {
        color = "#4caf50";
        textoAlarma = "✔️ LLENO";
      }

      gaugeChart.data.datasets[0].data = [nivel, 100 - nivel];
      gaugeChart.data.datasets[0].backgroundColor = [color, "#e0e0e0"];
      gaugeChart.update();

      document.getElementById("valorPorcentaje").innerHTML = nivel + "%";
      document.getElementById("valorPorcentaje").style.color = color;
      document.getElementById("valorCm").innerHTML = cm + " cm";
      document.getElementById("alarma").innerHTML = textoAlarma;
      document.getElementById("alarma").style.color = color;
    }
  });
</script>

</body>
</html>
