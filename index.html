<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Monitoreo Tinaco 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 {
      margin: 20px 0;
    }

    .contenedor {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .tinaco {
      background: #ffffff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 250px;
    }

    .valor {
      font-size: 36px;
      font-weight: bold;
      color: #007bff;
    }

    .dato {
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>Monitoreo Tinaco 1</h1>

  <div class="contenedor">
    <div class="tinaco">
      <h3>Tinaco 1</h3>
      <div class="valor" id="cm">--</div>
      <div class="dato">cm</div>
      <div class="dato">Nivel: <span id="nivel">--</span> %</div>
      <div class="dato">Alarma: <span id="alarma">--</span></div>
    </div>
  </div>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyBt1Xm-oijKo-g0dZYuF55s8mbLsgKq6_g",
      authDomain: "monitoreo-tinacos-marpa.firebaseapp.com",
      databaseURL: "https://monitoreo-tinacos-marpa-default-rtdb.firebaseio.com",
      projectId: "monitoreo-tinacos-marpa",
      storageBucket: "monitoreo-tinacos-marpa.firebasestorage.app",
      messagingSenderId: "812581613905",
      appId: "1:812581613905:web:7835af96923a2578682370"
    };

    firebase.initializeApp(firebaseConfig);
    var database = firebase.database();

    // Leer Tinaco 1 completo
    database.ref("tinacos/tinaco1").on("value", function(snapshot) {
      var data = snapshot.val();

      if (data) {
        document.getElementById("cm").innerHTML = data.cm ?? "--";
        document.getElementById("nivel").innerHTML = data.nivel ?? "--";
        document.getElementById("alarma").innerHTML = data.alarma ?? "--";
      }
    });
  </script>

</body>
</html>
